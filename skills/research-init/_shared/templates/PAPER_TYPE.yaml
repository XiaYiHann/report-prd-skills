---
schema_version: epoch_v1
version: V0

# Paper Type Declaration
# This file is mandatory. It is generated at epoch initialization and must be
# present for STATUS.yaml validation to pass. Agents are not allowed to modify
# paper_type without human approval.

paper_type: method
# Allowed: method | finding | system | benchmark | survey
# - method: proposes a general algorithm/framework.
# - finding: reports a discovered phenomenon.
# - system: introduces an infrastructure or tool.
# - benchmark: releases a dataset or evaluation protocol.
# - survey: synthesizes existing literature.

# Method Paper Claim Protection (单一真源)
# 当 paper_type = method 时，以下规则自动生效：
method_paper_protections:
  # RQ 失败 ≠ 方法失败
  rq_failure_scope: "rq_state_update_only"
  # 只有 subagent review 确认核心假设被 falsified，或人类显式喊停，才能停止方法验证
  stop_condition: "subagent_falsified_or_human_stop"
  # 负结果必须进入 wiki 作为 first-class insight，不得丢弃
  negative_result_policy: "first_class_wiki_entry"
  # 禁止从单个 RQ 的失败推断方法整体无效，禁止将 method 降级为 finding
  claim_downgrade_protection: true

tdd_required:
  enabled: true
  # For ALL paper types. L0 (static) -> L1 (deterministic) -> L2 (smoke) -> L3 (full).
  # See PIPELINE.md §4 and pre_flight.sh template.
