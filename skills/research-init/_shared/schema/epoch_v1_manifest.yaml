schema_version: epoch_v1
epoch_dir_pattern: 'V\d+'
required_files:
  - PRD.tex
  - PRD_SUMMARY.md
  - goal.md
  - RESEARCH_SPINE.yaml
  - SPEC.yaml
  - PLAN.md
  - STATUS.yaml
  - TASK_QUEUE.yaml
  - LOOP_LOG.md
  - GIT_STATE.yaml
  - git_log.md
  - AUDIT_QUEUE.yaml
  - HUMAN_REVIEW_REQUESTS.yaml
  - PAPER_CLAIM_LEDGER.yaml
  - closeout.md
  - PAPER_BINDING_DECISION.md
required_dirs:
  - plans
  - runs
  - artifacts
  - audits
  - search
  - reproduction
  - rqs
  - wiki
required_search_files:
  - search_report.md
  - web_search_log.yaml
  - repo_search_log.yaml
  - candidate_baselines.yaml
  - candidate_reproductions.yaml
required_reproduction_files:
  - REPRODUCTION_INDEX.yaml
  - REPRODUCTION_PLAN.md
  - REPRODUCTION_DELTA.yaml
required_wiki_files:
  - epoch_summary.md
  - evidence_map.md
  - positive_signals.md
  - negative_results.md
  - failed_paths.md
  - baseline_landscape.md
  - literature_notes.md
  - open_questions.md
  - next_version_seed.md
  - insight_index.yaml
yaml_required_fields:
  RESEARCH_SPINE.yaml:
    - template_version
    - version
    - direction_ref
    - research_questions
    - claims
    - experiments
    - evidence
    - figures_tables
    - paper_sections
  STATUS.yaml:
    - template_version
    - version
    - status
    - allowed_status
    - direction_ref
    - current_prd
    - current_spec
    - current_plan
    - current_task_queue
    - paper_binding
  SPEC.yaml:
    - template_version
    - version
    - direction_ref
    - prd_ref
    - experiments
    - datasets
    - models
    - baselines
    - metrics
    - seeds
    - harnesses
    - artifact_schemas
    - gates
    - anti_mock_policy
    - runtime_contract
    - reproduction_contract
    - filesystem_contract
    - rq_specs
    - carry_forward
  TASK_QUEUE.yaml:
    - template_version
    - version
    - queue_status
    - current_gate
    - current_task
    - gates
    - tasks
  AUDIT_QUEUE.yaml:
    - schema_version
    - epoch
    - audits
  HUMAN_REVIEW_REQUESTS.yaml:
    - schema_version
    - epoch
    - requests
  PAPER_CLAIM_LEDGER.yaml:
    - schema_version
    - epoch
    - claims
run_report_required_fields:
  - schema_version
  - report_version
  - epoch
  - gate_id
  - task_id
  - executor
  - task
  - git
  - environment
  - command
  - execution
  - stdout_summary
  - stderr_summary
  - artifacts
  - metrics
  - reproducibility
  - anti_mock
  - evidence
  - gate_outcome
  - conclusion
status_enums:
  task:
    - pending
    - active
    - completed
    - blocked
    - failed_execution
    - failed_harness
    - skipped
  gate:
    - pending
    - active
    - audit_required
    - audit_failed
    - passed
    - blocked
    - falsified
allowed_extra_patterns:
  - '.gitkeep'
