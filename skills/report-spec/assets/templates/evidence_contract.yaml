schema_version: "1.0"
evidence_rules:
  claim_evidence_must_include:
    - experiment_id
    - harness_id
    - command
    - config_path
    - dataset_split
    - seed_values
    - git_commit
    - raw_metric_paths
    - aggregate_result_path
    - stdout_log
    - stderr_log
    - artifact_hashes
    - validation_status
  forbidden_as_claim_evidence:
    - prose_summary
    - mock_result
    - toy_result
    - smoke_test_only
    - synthetic_data_unless_declared
    - cached_metric_without_raw_runs
    - missing_baseline
    - missing_seed
    - missing_config
    - missing_git_commit
claims: []
