report_type: "__REPORT_TYPE__"
audience: "__AUDIENCE__"
title: "__TITLE__"
topic: "__TOPIC__"
goal: "维护一份单一来源的中文 LaTeX 报告模板与正文工作区；渲染时同时输出 PDF 与 Markdown；先通过 brainstorming 讨论，再将确认后的结论写回正式报告。"
shared_references:
  decision_gates: "__DECISION_GATES_REF__"
  executor_report_style: "__EXECUTOR_STYLE_REF__"
  anti_patterns: "__ANTI_PATTERNS_REF__"
  progress_chapter_policy: "__PROGRESS_POLICY_REF__"
workflow_defaults:
  sequence:
    - "report-init: 生成固定半空模板，不预写长段正文，并渲染 report.pdf / report.md"
    - "report-brainstorming: 讨论、检索、比较与定方向，不写入报告源"
    - "report-update: 将已确认结论写回，重新渲染 report.pdf / report.md，并做全局一致性扫面"
    - "report-audit: 做质量检查、修复排序与 readiness judgment"
    - "report-debate: 仅在命题有争议时做正反裁决"
  brainstorming_contract: "brainstorming 阶段默认只在对话中产出结论，不修改 docs/report/<slug>/"
  update_contract: "任何局部改写完成后，都需要检查摘要、定义、术语、图注、表格和相关章节是否仍然一致"
interaction_contract:
  policy: "持续交互；机械动作可自动执行，方向性选择必须先询问用户；compile warning 必须清理，不能作为可发布状态"
  must_ask_before:
    - "锁定报告类型、主叙事或主要受众"
    - "确定 brainstorming 的目标问题、目标章节或讨论边界"
    - "决定是否把现状事实扩散到 `项目进度` 之外的章节"
    - "决定章节是否需要拆分、重排或大改 framing"
    - "决定某项修改应走普通改写还是升级为 debate"
    - "为了消除 LaTeX warning 而显著改变表格布局、图表位置或结论强调；如果需要改布局，先问用户怎么改，不能接受 warning 本身"
writing_style_defaults:
  audience_model: "默认面向中文 rookie 读者：愿意认真阅读，但不预设其熟悉术语、背景或实现细节"
  tone: "正式中文书面语；保持学术严谨，同时像高质量技术博客一样易读、克制、信息密度高"
  section_opening: "每节开头尽快说明本节解决什么问题，以及读者读完后应获得什么判断"
  explanation_rule:
    - "首次出现的重要技术概念，至少解释：定义、动机、作用机制、在本文中的角色和边界"
    - "如果一个判断依赖前提、数据来源或设计假设，必须明确写出"
    - "优先直接陈述信息，再解释原因；避免靠修辞对照制造重点"
  preferred_patterns:
    - "直接定义对象、职责、问题和结论"
    - "短段落、高密度、强主题句"
    - "图表承担信息压缩，正文承担解释与边界"
    - "用 `本文`、`本报告`、`本节` 等正式写法组织论证"
    - "先给总括句，再把每个小点拆成独立段落或独立列表项"
    - "只要进入显式分点，优先使用 `itemize` / `enumerate` 和 `\\item`"
  avoid_patterns:
    - "不是……而是……"
    - "并不是……而是……"
    - "真正重要的不是……"
    - "真正决定……的不是……"
    - "真正关注的不是……"
    - "真正的难点不在……"
    - "换句话说（若后文没有新增信息）"
    - "从某种意义上说"
    - "本质上（若后文没有新增定义、机制或边界）"
    - "在同一自然段中连续堆叠 `第一，……第二，……第三，……`"
    - "在同一自然段中连续堆叠 `其一，……其二，……`"
    - "在 `.tex` 正文中直接使用 `- `、`* `、`1. ` 这类伪列表，而不改成 `\\item`"
evidence_layers:
  - "source claim: 外部资料、论文、标准、官方文档明确说了什么"
  - "design intent: 本报告拟采用、拟建设、拟交付的目标态方案"
  - "repo-observed fact: 当前仓库、系统或实验产物真实已经显示了什么"
  - "report synthesis: 在以上证据基础上的综合判断、折中和建议"
repo_fact_policy:
  default_home: "项目进度"
  rule: "仓库现状、已完成里程碑、运行状态与当前阻塞默认集中写入 `项目进度`；其他章节只保留理解问题所需的最小现状事实"
must_include:
  - "执行摘要与阅读指南"
  - "一句话概述项目全景"
  - "背景、冲突、问题与回答"
  - "术语、概念或符号定义"
  - "至少一张 TikZ 总览图和一张 TikZ 关键机制或流程图"
  - "项目进度"
  - "风险、局限、下一步与交付边界"
visual_defaults:
  visual_principle: "默认图文并茂；涉及架构、框架、流程、协议、机制、实验或多层关系时，应优先配图"
  framework_diagram: "默认使用 TikZ 绘制总览图与分层图，强调系统边界、层次、关键依赖与决策节点"
  sequence_diagram: "最终成稿优先使用 TikZ 绘制时序或消息流图；Mermaid 仅用于 brainstorming 或快速草图"
  tikz_policy: "TikZ / PGFPlots 是最终报告图表的默认优先级；Mermaid 仅用于讨论阶段、快速试探或低风险草图"
  table_style: "表格优先用于对比、定义、证据与检查清单；列名尽量问句化"
self_check_requirements:
  - "XeLaTeX 编译是否成功"
  - "Markdown 导出是否成功生成 `docs/report/report.md`，且没有被当作独立真源手工维护"
  - "Overfull / Underfull、float、表格宽度、引用、交叉引用等 warning 是否已分类且清理；warning 不能作为可发布状态"
  - "`项目进度` 是否存在且格式合规"
  - "低信息密度句式是否命中禁用规则"
  - "已经分点的内容是否被拆成独立段落或列表，而不是压在同一大段里"
  - "显式分点是否已经转成 `itemize` / `enumerate` 和 `\\item`，而不是伪列表"
  - "涉及架构、流程、机制、协议或实验的章节，是否已经配图或配表"
  - "最终成稿是否至少包含一张 TikZ 图；若没有，是否有明确理由"
  - "术语、缩写、图注、表头和摘要口径是否存在明显漂移"
  - "是否把 repo 当前状态无节制地写进了非 `项目进度` 章节"
  - "术语是否在首次被使用之前已完成定义（由 self_check 的 terminology 检查覆盖）"
  - "图和表的 \\label 是否被正文 \\ref / \\cref 引用（由 self_check 的 figure-ref 检查覆盖）"
consistency_sweep_requirements:
  - "检查核心概念首次定义是否仍然正确"
  - "检查摘要、章节标题、图注、表头和正文口径是否一致"
  - "检查术语、缩写和英文标识是否出现多种漂移写法"
  - "检查 design intent 与 repo-observed fact 是否被混写"
open_questions: []
repo_paths: []
web_research_queries: []
language_style: "正式中文书面语：学术严谨、易读、信息密度高，面向中文 rookie 读者"
compile_review_must_check:
  - "Overfull / Underfull box（warning 必须清理，不可作为可发布状态）"
  - "表格过宽或分页异常"
  - "浮动体位置变化"
  - "未定义引用与 citation"
  - "目录、页眉、页脚与页码是否稳定"
